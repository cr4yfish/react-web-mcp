name: Publish to npm

# Publishes when a GitHub release is published (create a release for tag
# v<version> matching package.json). Requires the NPM_TOKEN repository secret:
# npmjs.com → Access Tokens → Generate New Token → Granular, with
# read/write on this package, then add it under Settings → Secrets → Actions.
on:
  release:
    types: [published]

permissions:
  contents: read
  # Needed for npm provenance (--provenance) once the repo is public.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}."
            exit 1
          fi

      - name: Publish
        # prepublishOnly runs the build. Add --provenance once the repo is
        # public to get a verified build attestation on npmjs.com.
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

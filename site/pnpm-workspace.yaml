# Marks site/ as its own pnpm root so installs here don't resolve against
# the repo root's pnpm-workspace.yaml. The package itself is consumed via
# the file:.. dependency, not a pnpm workspace link.

# The site renders no images (all CSS/SVG), so sharp's native build script
# isn't needed — prebuilt binaries from its optional deps suffice.
allowBuilds:
  sharp: false
